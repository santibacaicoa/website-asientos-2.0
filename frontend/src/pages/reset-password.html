<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restablecer contraseña</title>
    <link rel="stylesheet" href="./css/pages/login.css" />
  </head>
  <body>
    <main class="auth-page auth-page--login">
      <section class="auth-layout">
        <div class="auth-layout__visual" aria-hidden="true">
          <div class="auth-city-bg"></div>
        </div>

        <div class="auth-layout__panel">
          <div class="auth-panel">
            <div class="auth-panel__logo">
              <a href="./login.html">
                <img
                  src="./assets/images/ui/logo-assurant.png"
                  alt="Assurant"
                />
              </a>
            </div>

            <form
              class="auth-form auth-form--login"
              id="resetPasswordForm"
              novalidate
            >
              <div class="auth-field">
                <label class="auth-field__label" for="resetEmail">Email</label>
                <input
                  class="auth-field__input"
                  type="email"
                  id="resetEmail"
                  name="email"
                  autocomplete="email"
                  required
                />
              </div>

              <div class="auth-field">
                <label class="auth-field__label" for="resetToken">Token</label>
                <input
                  class="auth-field__input"
                  type="text"
                  id="resetToken"
                  name="token"
                  autocomplete="one-time-code"
                  inputmode="numeric"
                  maxlength="4"
                  pattern="[0-9]*"
                  required
                />
              </div>

              <div class="auth-field">
                <label class="auth-field__label" for="resetPassword"
                  >Nueva contraseña</label
                >
                <input
                  class="auth-field__input"
                  type="password"
                  id="resetPassword"
                  name="password"
                  autocomplete="new-password"
                  required
                />
              </div>

              <p class="auth-form__message" id="resetMessage"></p>

              <div class="auth-form__actions">
                <button
                  class="auth-button auth-button--primary auth-button--small"
                  type="submit"
                >
                  Cambiar
                </button>
              </div>

              <div class="auth-form__links">
                <a class="auth-link" href="./login-form.html"
                  >Volver a iniciar sesión</a
                >
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./js/pages/reset-password.js"></script>
  </body>
</html>

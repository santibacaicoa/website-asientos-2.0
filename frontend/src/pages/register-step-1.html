<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - Paso 1</title>
    <link rel="stylesheet" href="../css/pages/register.css" />
  </head>
  <body>
    <main class="auth-page auth-page--register-step-1">
      <section class="auth-layout">
        <div class="auth-layout__visual" aria-hidden="true">
          <div class="auth-city-bg"></div>
        </div>

        <div class="auth-layout__panel">
          <div class="auth-panel">
            <div class="auth-panel__logo">
              <img src="./assets/images/ui/logo-assurant.png" alt="Assurant" />
            </div>

            <form
              class="auth-form auth-form--register"
              id="registerStep1Form"
              novalidate
            >
              <div class="auth-field">
                <label class="auth-field__label" for="registerEmail"
                  >Email</label
                >
                <input
                  class="auth-field__input"
                  type="email"
                  id="registerEmail"
                  name="email"
                  autocomplete="email"
                  required
                />
              </div>

              <div class="auth-field">
                <label class="auth-field__label" for="registerPassword"
                  >Contraseña</label
                >
                <input
                  class="auth-field__input"
                  type="password"
                  id="registerPassword"
                  name="password"
                  autocomplete="new-password"
                  required
                />
              </div>

              <div class="auth-field">
                <label class="auth-field__label" for="registerPasswordRepeat"
                  >Repetir contraseña</label
                >
                <input
                  class="auth-field__input"
                  type="password"
                  id="registerPasswordRepeat"
                  name="passwordRepeat"
                  autocomplete="new-password"
                  required
                />
              </div>

              <div class="auth-form__actions">
                <button
                  class="auth-button auth-button--primary auth-button--small"
                  type="submit"
                >
                  Siguiente
                </button>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="../js/pages/register-step-1.js"></script>
  </body>
</html>

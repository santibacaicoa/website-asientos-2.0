<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hub - Website Asientos</title>
    <link rel="stylesheet" href="./css/pages/hub.css" />
  </head>

  <body>
    <main class="hub-page">
      <!-- =====================================================
           SIDEBAR DESKTOP
           Función:
           - Navegación lateral para desktop.
           - En mobile se oculta y se usa bottom nav.
      ====================================================== -->
      <aside class="hub-sidebar">
        <div class="hub-profile-menu">
          <button
            class="hub-sidebar__avatar"
            id="profileMenuButtonDesktop"
            type="button"
            aria-label="Perfil"
          >
            <img
              class="user-avatar"
              src="./assets/images/ui/avatar-default.png"
              alt="Usuario"
            />
          </button>

          <div class="hub-profile-dropdown" id="profileDropdownDesktop">
            <button type="button" class="changePhotoBtn">Cambiar foto</button>
            <a href="./forgot-password.html">Cambiar contraseña</a>
            <button type="button" class="logoutAction">Cerrar sesión</button>
          </div>
        </div>

        <nav class="hub-sidebar__nav" aria-label="Navegación principal">
          <a class="hub-sidebar__link is-active" href="./hub.html">
            <svg viewBox="0 0 24 24" width="28" height="28">
              <path
                d="M3 10.5L12 3l9 7.5v9a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1v-9z"
                fill="currentColor"
              />
            </svg>
          </a>

          <a class="hub-sidebar__link" href="./mapa.html">
            <svg viewBox="0 0 24 24">
              <path
                d="M12 22s7-5.5 7-11a7 7 0 1 0-14 0c0 5.5 7 11 7 11z"
                fill="currentColor"
              />
              <circle cx="12" cy="11" r="2.5" fill="white" />
            </svg>
          </a>

          <a class="hub-sidebar__link" href="./chat.html" aria-label="Chat">
            <svg viewBox="0 0 24 24" width="28" height="28">
              <path d="M4 4h16v12H7l-3 3V4z" fill="currentColor" />
            </svg>
          </a>
        </nav>

        <a class="hub-sidebar__logo" href="./hub.html" aria-label="Inicio">
          <img src="./assets/images/ui/logo-assurant.png" alt="Assurant" />
        </a>
      </aside>

      <!-- =====================================================
           CONTENIDO PRINCIPAL
           Función:
           - Contiene todo lo visible del hub.
      ====================================================== -->
      <section class="hub-content">
        <!-- =====================================================
             TOPBAR MOBILE
             Función:
             - Logo, fecha/hora y avatar para mobile.
        ====================================================== -->
        <header class="hub-mobile-header">
          <div class="hub-profile-menu hub-profile-menu--mobile-top">
            <button
              class="hub-profile-button"
              id="profileMenuButtonMobile"
              type="button"
              aria-label="Perfil"
            >
              <img
                class="user-avatar"
                src="./assets/images/ui/avatar-default.png"
                alt="Usuario"
              />
            </button>

            <div
              class="hub-profile-dropdown hub-profile-dropdown--mobile"
              id="profileDropdownMobile"
            >
              <button type="button" class="changePhotoBtn">Cambiar foto</button>
              <a href="./forgot-password.html">Cambiar contraseña</a>
              <button type="button" class="logoutAction">Cerrar sesión</button>
            </div>
          </div>

          <div class="hub-mobile-header__datetime" id="currentDateTimeMobile">
            --
          </div>
        </header>

        <!-- =====================================================
             HEADER DESKTOP / SALUDO
             Función:
             - Muestra fecha y saludo.
             - El nombre viene desde localStorage.
        ====================================================== -->
        <section class="hub-hero-header">
          <div>
            <p class="hub-date" id="currentDateTimeDesktop">--</p>
            <h1 class="hub-title">
              Hola, <span id="userFirstName">Usuario</span>!
            </h1>
          </div>
        </section>

        <!-- =====================================================
             CARD PRINCIPAL
             Función:
             - Imagen principal de Assurant.
             - Botón Reservar preparado para futuro mapa/reservas.
        ====================================================== -->
        <section class="hub-main-card">
          <img
            class="hub-main-card__image"
            src="./assets/images/ui/assurant-building.png"
            alt="Edificio Assurant"
          />

          <div class="hub-main-card__overlay">
            <a class="hub-reserve-button" href="./mapa.html">
              <span>Reservar</span>
              <span aria-hidden="true">→</span>
            </a>

            <p class="hub-main-card__phrase">
              Common sense, common integrity, uncommon thinking, uncommon
              results
            </p>
          </div>
        </section>

        <!-- =====================================================
             SUPERVISOR
             Función:
             - Muestra supervisor asignado.
             - Por ahora es placeholder hasta crear módulo supervisor.
        ====================================================== -->
        <section class="hub-supervisor-card">
          <p class="hub-supervisor-card__label">Tu supervisor/a</p>

          <button
            class="hub-supervisor-card__button"
            id="supervisorButton"
            type="button"
          >
            <span id="supervisorName">Seleccionar</span>
            <span class="hub-supervisor-card__arrow" id="supervisorArrow"
              >→</span
            >
            <img
              class="hub-supervisor-card__avatar"
              id="supervisorAvatar"
              src="./assets/images/ui/avatar-default.png"
              alt="Supervisor"
            />
          </button>
        </section>

        <!-- =====================================================
             MÉTRICAS PLACEHOLDER
             Función:
             - Por ahora quedan en 0 porque dependen de reservas.
        ====================================================== -->
        <section class="hub-stats">
          <article class="hub-stat-card">
            <p>Total asientos</p>
            <strong id="totalSeats">0</strong>
          </article>

          <article class="hub-stat-card">
            <p>Ocupados hoy</p>
            <strong id="occupiedToday">0</strong>
          </article>

          <article class="hub-stat-card">
            <p>Disponibles hoy</p>
            <strong id="availableToday">0</strong>
          </article>
        </section>
      </section>

      <!-- =====================================================
           BOTTOM NAV MOBILE
           Función:
           - Navegación inferior tipo app.
           - Solo aparece en mobile.
      ====================================================== -->
      <nav class="hub-bottom-nav" aria-label="Navegación mobile">
        <a
          class="hub-bottom-nav__item hub-bottom-nav__item--home is-active"
          href="./hub.html"
          aria-label="Hub"
        >
          <svg viewBox="0 0 24 24">
            <path
              d="M3 10.5L12 3l9 7.5v9a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1v-9z"
              fill="currentColor"
            />
          </svg>
        </a>

        <a
          class="hub-bottom-nav__item hub-bottom-nav__item--map"
          href="./mapa.html"
          aria-label="Mapa"
        >
          <svg viewBox="0 0 24 24">
            <path
              d="M12 22s7-5.5 7-11a7 7 0 1 0-14 0c0 5.5 7 11 7 11z"
              fill="currentColor"
            />
            <circle cx="12" cy="11" r="2.5" fill="white" />
          </svg>
        </a>

        <a class="hub-bottom-nav__logo" href="./hub.html" aria-label="Inicio">
          <img src="./assets/images/ui/logo-assurant.png" alt="Assurant" />
        </a>

        <a
          class="hub-bottom-nav__item hub-bottom-nav__item--chat"
          href="./chat.html"
          aria-label="Chat"
        >
          <svg viewBox="0 0 24 24">
            <path d="M4 4h16v12H7l-3 3V4z" fill="currentColor" />
          </svg>
        </a>

        <button
          class="hub-bottom-nav__item hub-bottom-nav__item--profile"
          id="profileMenuButtonBottom"
          type="button"
          aria-label="Perfil"
        >
          <svg
            viewBox="0 0 24 24"
            aria-hidden="true"
            fill="none"
            stroke="currentColor"
            stroke-width="2.2"
            stroke-linecap="round"
          >
            <line x1="4" y1="7" x2="20" y2="7"></line>
            <line x1="4" y1="12" x2="20" y2="12"></line>
            <line x1="4" y1="17" x2="20" y2="17"></line>
          </svg>
        </button>
      </nav>
    </main>
    <!-- =====================================================
     MODAL RECORTE FOTO PERFIL
     Función:
     - Permite previsualizar la foto dentro de un círculo.
     - Permite hacer zoom antes de guardar.
====================================================== -->
    <div class="photo-crop-modal" id="photoCropModal" aria-hidden="true">
      <div class="photo-crop-modal__backdrop"></div>

      <section class="photo-crop-modal__panel" role="dialog" aria-modal="true">
        <header class="photo-crop-modal__header">
          <h2>Ajustar foto</h2>
          <button
            class="photo-crop-modal__close"
            id="photoCropClose"
            type="button"
            aria-label="Cerrar"
          >
            ×
          </button>
        </header>

        <div class="photo-crop-modal__preview">
          <canvas id="photoCropCanvas" width="320" height="320"></canvas>
        </div>

        <label class="photo-crop-modal__zoom">
          <span>Zoom</span>
          <input
            id="photoCropZoom"
            type="range"
            min="1"
            max="3"
            step="0.01"
            value="1"
          />
        </label>

        <footer class="photo-crop-modal__actions">
          <button
            class="photo-crop-modal__button photo-crop-modal__button--secondary"
            id="photoCropCancel"
            type="button"
          >
            Cancelar
          </button>

          <button
            class="photo-crop-modal__button photo-crop-modal__button--primary"
            id="photoCropSave"
            type="button"
          >
            Guardar
          </button>
        </footer>
      </section>
    </div>

    <input type="file" id="photoInput" accept="image/*" style="display: none" />

    <script type="module" src="./js/pages/hub.js"></script>
  </body>
</html>
